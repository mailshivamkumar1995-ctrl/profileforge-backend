name: ProfileForge CI/CD

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Run Tests

    runs-on: ubuntu-latest

    env:
      DJANGO_SETTINGS_MODULE: config.settings.test

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/development.txt

      - name: Run Tests
        run: |
          pytest

  build-and-push:
    name: Build & Push Docker Image

    runs-on: ubuntu-latest

    needs: test

    if: github.event_name == 'push'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker Image
        run: |
          docker build \
            --target production \
            -t ghcr.io/${{ github.repository_owner }}/profileforge-backend:latest \
            -t ghcr.io/${{ github.repository_owner }}/profileforge-backend:${{ github.sha }} \
            .

      - name: Push Latest Image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/profileforge-backend:latest

      - name: Push Commit SHA Image
        run: |
          docker push ghcr.io/${{ github.repository_owner }}/profileforge-backend:${{ github.sha }}
